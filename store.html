<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المتجر — مافيا</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Changa:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    :root {
      --clr-create: #ff0055;
      --clr-join: #00d2ff;
      --clr-gold: #e5c05c;
      --clr-green: #3a8a55;
      --clr-purple: #9d50bb;
      --clr-bg: #020308;
      --clr-surface: rgba(10, 14, 32, 0.85);
      --clr-border: rgba(229, 192, 92, 0.18);
      --clr-text: #d0cfe8;
      --clr-muted: #7a79a0;
      --radius: 14px;
      --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      font-family: 'Changa', sans-serif;
      background: radial-gradient(circle at center, #0a0e20 0%, #020308 100%);
      min-height: 100vh;
      color: var(--clr-text);
      overflow-x: hidden;
      position: relative;
    }

    /* ── CRT Overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.18) 2px,
        rgba(0, 0, 0, 0.18) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.72) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0e20; }
    ::-webkit-scrollbar-thumb { background: var(--clr-gold); border-radius: 3px; }

    /* ══════════════════════════════════════════
       HUD / TOP BAR
    ══════════════════════════════════════════ */
    #hud {
      position: sticky;
      top: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: rgba(2, 3, 8, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--clr-border);
    }

    .hud-back {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid rgba(229, 192, 92, 0.35);
      border-radius: 8px;
      color: var(--clr-gold);
      font-family: 'Changa', sans-serif;
      font-size: 0.95rem;
      padding: 8px 18px;
      cursor: pointer;
      transition: var(--transition);
    }
    .hud-back:hover {
      background: rgba(229, 192, 92, 0.12);
      border-color: var(--clr-gold);
      box-shadow: 0 0 14px rgba(229, 192, 92, 0.3);
    }
    .hud-back svg { width: 16px; height: 16px; }

    .hud-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 0.25em;
      color: var(--clr-gold);
      text-shadow: 0 0 24px rgba(229, 192, 92, 0.55), 0 0 48px rgba(229, 192, 92, 0.25);
    }

    .hud-gems {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(229, 192, 92, 0.08);
      border: 1px solid rgba(229, 192, 92, 0.3);
      border-radius: 24px;
      padding: 8px 20px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--clr-gold);
      transition: var(--transition);
    }
    .hud-gems .gem-icon { font-size: 1.2rem; }
    #gems-count { transition: color 0.3s; }

    /* ══════════════════════════════════════════
       TABS
    ══════════════════════════════════════════ */
    #tabs-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 28px 24px 20px;
      flex-wrap: wrap;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 26px;
      background: rgba(10, 14, 32, 0.7);
      border: 1px solid rgba(157, 80, 187, 0.3);
      border-radius: 32px;
      color: var(--clr-muted);
      font-family: 'Changa', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .tab-btn .tab-icon { font-size: 1.1rem; }
    .tab-btn:hover {
      border-color: var(--clr-purple);
      color: #c9a0d8;
      background: rgba(157, 80, 187, 0.1);
    }
    .tab-btn.active {
      background: rgba(157, 80, 187, 0.2);
      border-color: var(--clr-purple);
      color: #d9a8e8;
      box-shadow: 0 0 18px rgba(157, 80, 187, 0.35), inset 0 0 12px rgba(157, 80, 187, 0.1);
    }
    .tab-btn.active[data-tab="backs"] { --tab-clr: var(--clr-create); }
    .tab-btn.active[data-tab="avatars"] { --tab-clr: var(--clr-join); }
    .tab-btn.active[data-tab="effects"] { --tab-clr: var(--clr-green); }
    .tab-btn.active[data-tab="bundles"] { --tab-clr: var(--clr-gold); }

    .tab-btn[data-tab="backs"].active {
      border-color: var(--clr-create);
      color: #ff6688;
      background: rgba(255, 0, 85, 0.15);
      box-shadow: 0 0 18px rgba(255, 0, 85, 0.3);
    }
    .tab-btn[data-tab="avatars"].active {
      border-color: var(--clr-join);
      color: #66e0ff;
      background: rgba(0, 210, 255, 0.12);
      box-shadow: 0 0 18px rgba(0, 210, 255, 0.3);
    }
    .tab-btn[data-tab="effects"].active {
      border-color: var(--clr-green);
      color: #72c48a;
      background: rgba(58, 138, 85, 0.15);
      box-shadow: 0 0 18px rgba(58, 138, 85, 0.3);
    }
    .tab-btn[data-tab="bundles"].active {
      border-color: var(--clr-gold);
      color: var(--clr-gold);
      background: rgba(229, 192, 92, 0.12);
      box-shadow: 0 0 18px rgba(229, 192, 92, 0.3);
    }

    /* ══════════════════════════════════════════
       PRODUCTS GRID
    ══════════════════════════════════════════ */
    #store-main {
      padding: 10px 32px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    @media (max-width: 900px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .products-grid { grid-template-columns: 1fr; }
      #store-main { padding: 10px 16px 50px; }
    }

    /* ── Product Card ── */
    .product-card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      cursor: pointer;
      will-change: transform;
    }

    .product-card:hover {
      transform: translateY(-8px) scale(1.015);
    }

    /* category-specific glow on hover */
    .product-card[data-cat="backs"]:hover {
      border-color: rgba(255, 0, 85, 0.6);
      box-shadow: 0 12px 40px rgba(255, 0, 85, 0.25), 0 0 0 1px rgba(255, 0, 85, 0.15);
    }
    .product-card[data-cat="avatars"]:hover {
      border-color: rgba(0, 210, 255, 0.6);
      box-shadow: 0 12px 40px rgba(0, 210, 255, 0.22), 0 0 0 1px rgba(0, 210, 255, 0.12);
    }
    .product-card[data-cat="effects"]:hover {
      border-color: rgba(58, 138, 85, 0.6);
      box-shadow: 0 12px 40px rgba(58, 138, 85, 0.25), 0 0 0 1px rgba(58, 138, 85, 0.12);
    }
    .product-card[data-cat="bundles"]:hover {
      border-color: rgba(229, 192, 92, 0.6);
      box-shadow: 0 12px 40px rgba(229, 192, 92, 0.22), 0 0 0 1px rgba(229, 192, 92, 0.12);
    }

    /* OWNED badge */
    .product-card.owned::after {
      content: '✓ OWNED';
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--clr-green);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 20px;
      z-index: 2;
    }

    /* FEATURED badge */
    .badge-featured {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--clr-gold);
      color: #0a0e20;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 20px;
      z-index: 2;
    }

    .product-art {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Art backgrounds per category */
    .product-card[data-cat="backs"] .product-art {
      background: linear-gradient(135deg, #1a0010 0%, #3a0020 50%, #0a000a 100%);
    }
    .product-card[data-cat="avatars"] .product-art {
      background: linear-gradient(135deg, #00101a 0%, #003548 50%, #000a10 100%);
    }
    .product-card[data-cat="effects"] .product-art {
      background: linear-gradient(135deg, #001a08 0%, #0a3518 50%, #000a04 100%);
    }
    .product-card[data-cat="bundles"] .product-art {
      background: linear-gradient(135deg, #1a1000 0%, #3a2a00 50%, #0a0800 100%);
    }

    .product-art .art-glow {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s;
      border-radius: inherit;
    }
    .product-card[data-cat="backs"] .art-glow {
      background: radial-gradient(circle at center, rgba(255,0,85,0.2) 0%, transparent 70%);
    }
    .product-card[data-cat="avatars"] .art-glow {
      background: radial-gradient(circle at center, rgba(0,210,255,0.18) 0%, transparent 70%);
    }
    .product-card[data-cat="effects"] .art-glow {
      background: radial-gradient(circle at center, rgba(58,138,85,0.2) 0%, transparent 70%);
    }
    .product-card[data-cat="bundles"] .art-glow {
      background: radial-gradient(circle at center, rgba(229,192,92,0.18) 0%, transparent 70%);
    }
    .product-card:hover .art-glow { opacity: 1; }

    .product-art .art-icon {
      position: relative;
      z-index: 1;
      text-shadow: 0 4px 24px rgba(0,0,0,0.6);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .product-card:hover .art-icon { transform: scale(1.18); }

    .product-body {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 8px;
    }

    .product-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #e8e6f0;
      letter-spacing: 0.04em;
      line-height: 1.3;
    }

    .product-desc {
      font-size: 0.82rem;
      color: var(--clr-muted);
      line-height: 1.5;
      flex: 1;
    }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
      gap: 10px;
    }

    .product-price {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--clr-gold);
    }
    .product-price .gem { font-size: 1rem; }

    .owned-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--clr-green);
      letter-spacing: 0.06em;
    }

    .btn-buy {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      font-family: 'Changa', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .product-card[data-cat="backs"] .btn-buy {
      background: rgba(255, 0, 85, 0.2);
      color: #ff6688;
      border: 1px solid rgba(255, 0, 85, 0.4);
    }
    .product-card[data-cat="backs"] .btn-buy:hover {
      background: rgba(255, 0, 85, 0.35);
      box-shadow: 0 0 16px rgba(255, 0, 85, 0.4);
    }
    .product-card[data-cat="avatars"] .btn-buy {
      background: rgba(0, 210, 255, 0.15);
      color: #66e0ff;
      border: 1px solid rgba(0, 210, 255, 0.35);
    }
    .product-card[data-cat="avatars"] .btn-buy:hover {
      background: rgba(0, 210, 255, 0.28);
      box-shadow: 0 0 16px rgba(0, 210, 255, 0.35);
    }
    .product-card[data-cat="effects"] .btn-buy {
      background: rgba(58, 138, 85, 0.18);
      color: #72c48a;
      border: 1px solid rgba(58, 138, 85, 0.4);
    }
    .product-card[data-cat="effects"] .btn-buy:hover {
      background: rgba(58, 138, 85, 0.32);
      box-shadow: 0 0 16px rgba(58, 138, 85, 0.35);
    }
    .product-card[data-cat="bundles"] .btn-buy {
      background: rgba(229, 192, 92, 0.15);
      color: var(--clr-gold);
      border: 1px solid rgba(229, 192, 92, 0.4);
    }
    .product-card[data-cat="bundles"] .btn-buy:hover {
      background: rgba(229, 192, 92, 0.28);
      box-shadow: 0 0 16px rgba(229, 192, 92, 0.35);
    }

    /* ══════════════════════════════════════════
       MODALS
    ══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .modal-box {
      background: #0d1126;
      border: 1px solid var(--clr-border);
      border-radius: 18px;
      padding: 36px 40px;
      max-width: 440px;
      width: 100%;
      position: relative;
      text-align: center;
      box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(229,192,92,0.08);
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.visible .modal-box { transform: scale(1); }

    .modal-close {
      position: absolute;
      top: 14px;
      left: 14px;
      background: none;
      border: none;
      color: var(--clr-muted);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      padding: 4px 8px;
    }
    .modal-close:hover { color: var(--clr-text); }

    .modal-art { font-size: 4.5rem; margin-bottom: 16px; }

    .modal-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.25rem;
      font-weight: 900;
      color: #e8e6f0;
      margin-bottom: 8px;
    }

    .modal-sub {
      font-size: 0.9rem;
      color: var(--clr-muted);
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .modal-price-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--clr-gold);
      margin-bottom: 28px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn-modal {
      padding: 12px 32px;
      border-radius: 10px;
      font-family: 'Changa', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: var(--transition);
    }
    .btn-confirm {
      background: var(--clr-green);
      color: #fff;
    }
    .btn-confirm:hover {
      background: #4aaa6a;
      box-shadow: 0 0 20px rgba(58, 138, 85, 0.5);
    }
    .btn-cancel {
      background: rgba(255,255,255,0.07);
      color: var(--clr-text);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.12); }

    /* Insufficient funds modal */
    #modal-insufficient .modal-title { color: var(--clr-create); }
    #modal-insufficient .modal-art { filter: grayscale(0.3); }
    .btn-get-more {
      background: linear-gradient(135deg, var(--clr-gold), #c8992a);
      color: #0a0e20;
      padding: 13px 36px;
      border-radius: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: none;
      transition: var(--transition);
    }
    .btn-get-more:hover {
      transform: scale(1.05);
      box-shadow: 0 0 24px rgba(229, 192, 92, 0.5);
    }

    /* ── Purchase success flash ── */
    .purchase-flash {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(58, 138, 85, 0.95);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 12px 28px;
      border-radius: 32px;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 24px rgba(58, 138, 85, 0.4);
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--clr-muted);
      font-size: 1.05rem;
    }
    .empty-state .empty-icon { font-size: 3.5rem; margin-bottom: 14px; }
  </style>
</head>
<body>

  <!-- HUD -->
  <header id="hud">
    <button class="hud-back" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      رجوع
    </button>

    <h1 class="hud-title">STORE</h1>

    <div class="hud-gems" id="gems-display">
      <span class="gem-icon">💎</span>
      <span id="gems-count">1250</span>
    </div>
  </header>

  <!-- TABS -->
  <nav id="tabs-bar">
    <button class="tab-btn active" data-tab="backs">
      <span class="tab-icon">🃏</span> ظهور البطاقات
    </button>
    <button class="tab-btn" data-tab="avatars">
      <span class="tab-icon">👤</span> الأفاتارات
    </button>
    <button class="tab-btn" data-tab="effects">
      <span class="tab-icon">✨</span> التأثيرات
    </button>
    <button class="tab-btn" data-tab="bundles">
      <span class="tab-icon">📦</span> العروض
    </button>
  </nav>

  <!-- STORE MAIN -->
  <main id="store-main">
    <div class="products-grid" id="products-grid"></div>
  </main>

  <!-- MODAL: Confirm Purchase -->
  <div class="modal-overlay" id="modal-confirm">
    <div class="modal-box">
      <button class="modal-close" id="confirm-close">✕</button>
      <div class="modal-art" id="confirm-art">🃏</div>
      <h2 class="modal-title" id="confirm-name">اسم المنتج</h2>
      <p class="modal-sub" id="confirm-desc">وصف المنتج</p>
      <div class="modal-price-row">
        <span id="confirm-price">150</span>
        <span>💎</span>
      </div>
      <div class="modal-actions">
        <button class="btn-modal btn-cancel" id="confirm-cancel">إلغاء</button>
        <button class="btn-modal btn-confirm" id="confirm-buy">شراء الآن ✓</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Insufficient Funds -->
  <div class="modal-overlay" id="modal-insufficient">
    <div class="modal-box">
      <button class="modal-close" id="insuff-close">✕</button>
      <div class="modal-art">💸</div>
      <h2 class="modal-title">رصيد غير كافٍ</h2>
      <p class="modal-sub">
        لا تملك جواهر كافية لشراء هذا المنتج.<br />
        العب المزيد من الجولات لتجميع الجواهر!
      </p>
      <div class="modal-actions" style="flex-direction:column; align-items:center; gap:10px;">
        <button class="btn-get-more" onclick="closeInsuffModal()">احصل على المزيد 💎</button>
        <button class="btn-modal btn-cancel" onclick="closeInsuffModal()">ربما لاحقاً</button>
      </div>
    </div>
  </div>

  <!-- Purchase Flash -->
  <div class="purchase-flash" id="purchase-flash">تم الشراء بنجاح! ✓</div>

  <script>
    // ══════════════════════════════════════════
    // DATA
    // ══════════════════════════════════════════
    const PRODUCTS = {
      backs: [
        { id: 'back_dark',    name: 'الظلام الأبدي',    desc: 'ظهر بطاقة يستحضر عتمة الليل الأبدية مع نجوم خافتة.',    icon: '🌑', price: 150 },
        { id: 'back_flame',   name: 'اللهب الأحمر',     desc: 'ألسنة لهب حمراء ترقص على خلفية داكنة.',                  icon: '🔥', price: 200 },
        { id: 'back_forest',  name: 'الغابة المظلمة',   desc: 'تصميم مستوحى من غابات الظلام الكثيفة.',                  icon: '🌲', price: 180 },
        { id: 'back_ice',     name: 'الثلج الأزرق',     desc: 'بلورات ثلج زرقاء شفافة تتلألأ بالضوء.',                  icon: '❄️', price: 120 },
        { id: 'back_gold',    name: 'الذهب الملكي',     desc: 'زخارف ذهبية فاخرة تعكس مكانة الملوك.',                   icon: '👑', price: 350, featured: true },
        { id: 'back_mafia',   name: 'ليل المافيا',       desc: 'مستوحى من أجواء المافيا الكلاسيكية في الليل.',           icon: '🌃', price: 250 },
        { id: 'back_void',    name: 'الفراغ الكوني',    desc: 'اتساع الكون اللامتناهي في راحة يدك.',                    icon: '🌌', price: 190 },
        { id: 'back_blood',   name: 'الدماء المقدسة',   desc: 'قطرات حمراء تتساقط على خلفية سوداء صامتة.',              icon: '💀', price: 220 },
      ],
      avatars: [
        { id: 'av_lion',    name: 'أسد الصحراء',    desc: 'أسد مهيب يجسّد القوة والسيادة على الجميع.',     icon: '👑', price: 180, featured: true },
        { id: 'av_wolf',    name: 'الذئب الرمادي',   desc: 'ذئب خفيّ يتحرك بهدوء ويضرب بدقة فائقة.',       icon: '🐺', price: 120 },
        { id: 'av_tiger',   name: 'النمر المخطط',    desc: 'نمر شرس لا يرحم أعداءه أبداً في الميدان.',      icon: '🐅', price: 160 },
        { id: 'av_bear',    name: 'الدب الضخم',      desc: 'قوة الدب الهائلة تخيف كل من يراها من بعيد.',    icon: '🐻', price: 90 },
        { id: 'av_eagle',   name: 'النسر الحر',       desc: 'يحلّق في الأعالي ويرى ما لا يراه الآخرون.',     icon: '🦅', price: 140 },
        { id: 'av_snake',   name: 'الأفعى الصامتة',  desc: 'تتسلل في الظلام وتنقضّ في اللحظة المناسبة.',    icon: '🐍', price: 100 },
        { id: 'av_dragon',  name: 'تنين الجحيم',     desc: 'تنين أسطوري يبثّ الرعب في قلوب المنافسين.',     icon: '🐉', price: 200 },
        { id: 'av_shark',   name: 'قرش الأعماق',     desc: 'يسبح بهدوء ثم يلتهم فريسته دون رحمة.',          icon: '🦈', price: 80 },
      ],
      effects: [
        { id: 'fx_particles', name: 'وابل الجسيمات',  desc: 'انفجار مذهل من الجسيمات المضيئة عند كل فوز.',      icon: '✨', price: 200, featured: true },
        { id: 'fx_sound',     name: 'الصوت الملكي',   desc: 'مؤثر صوتي حصري يُشغَّل عند إعلان النصر.',          icon: '🎵', price: 150 },
        { id: 'fx_flip',      name: 'حركة البطاقة',   desc: 'انيميشن خاص يضيف تأثير دوران مثير للبطاقات.',       icon: '🌀', price: 180 },
        { id: 'fx_lightning', name: 'صاعقة البرق',    desc: 'شرارة برق خاطفة تضيء الشاشة عند كل إجراء قوي.',    icon: '⚡', price: 160 },
        { id: 'fx_trail',     name: 'أثر الحركة',     desc: 'يترك خيطاً مضيئاً ساحراً خلف كل بطاقة تتحرك.',     icon: '💫', price: 130 },
        { id: 'fx_confetti',  name: 'مطر الكونفيتي',  desc: 'احتفال بألوان قوس قزح عند الفوز بالجولة.',          icon: '🎊', price: 110 },
        { id: 'fx_ghost',     name: 'تأثير الشبح',    desc: 'البطاقات تظهر وتختفي كالأشباح في الليل.',           icon: '👻', price: 170 },
        { id: 'fx_fire_trail',name: 'أثر النيران',    desc: 'اترك أثراً من النيران الحمراء عند تحريك بطاقاتك.', icon: '🔥', price: 220 },
      ],
      bundles: [
        { id: 'bundle_starter', name: 'حزمة المبتدئ',    desc: 'كل ما يحتاجه اللاعب الجديد: ظهر بطاقة + أفاتار + تأثير.', icon: '📦', price: 400 },
        { id: 'bundle_pro',     name: 'حزمة المحترف',    desc: 'الأفضل للمحترفين: 3 ظهور بطاقات + 3 أفاتارات + 2 تأثيرات.', icon: '💼', price: 800, featured: true },
        { id: 'bundle_shadow',  name: 'حزمة الظل',       desc: 'كل المحتوى ذو الطابع الليلي والغامض في مجموعة واحدة.',       icon: '🌑', price: 600 },
        { id: 'bundle_fire',    name: 'حزمة النار',       desc: 'كل المحتوى النيراني: بطاقات + تأثيرات لهب حصرية.',         icon: '🔥', price: 550 },
        { id: 'bundle_royal',   name: 'الحزمة الملكية',  desc: 'المجموعة الذهبية الحصرية للملوك وكبار اللاعبين فقط.',      icon: '👑', price: 1200 },
        { id: 'bundle_vip',     name: 'الحزمة VIP',      desc: 'جميع المحتوى المتاح حالياً بخصم 40% — عرض لفترة محدودة!',  icon: '💎', price: 1800, featured: true },
      ],
    };

    // ══════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════
    let gems = parseInt(localStorage.getItem('maf_gems') || '1250', 10);
    let owned = JSON.parse(localStorage.getItem('maf_owned') || '[]');
    let currentTab = 'backs';
    let pendingProduct = null;

    // ══════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════
    document.getElementById('gems-count').textContent = gems.toLocaleString('ar-EG');

    // ══════════════════════════════════════════
    // RENDER PRODUCTS
    // ══════════════════════════════════════════
    function renderProducts(tab) {
      const grid = document.getElementById('products-grid');
      const items = PRODUCTS[tab] || [];

      // Remove old cards
      while (grid.firstChild) grid.removeChild(grid.firstChild);

      if (!items.length) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div>لا توجد منتجات في هذه الفئة حالياً.</div>`;
        return;
      }

      items.forEach((item, i) => {
        const isOwned = owned.includes(item.id);
        const card = document.createElement('div');
        card.className = 'product-card' + (isOwned ? ' owned' : '');
        card.dataset.cat = tab;
        card.dataset.id = item.id;

        card.innerHTML = `
          ${item.featured && !isOwned ? `<span class="badge-featured">⭐ مميز</span>` : ''}
          <div class="product-art">
            <div class="art-glow"></div>
            <span class="art-icon">${item.icon}</span>
          </div>
          <div class="product-body">
            <div class="product-name">${item.name}</div>
            <div class="product-desc">${item.desc}</div>
            <div class="product-footer">
              ${isOwned
                ? `<span class="owned-label">✓ تمتلكه</span><span style="font-size:0.8rem;color:var(--clr-muted)">في مجموعتك</span>`
                : `<div class="product-price"><span>${item.price.toLocaleString('ar-EG')}</span><span class="gem">💎</span></div>
                   <button class="btn-buy" data-id="${item.id}" data-tab="${tab}">شراء</button>`
              }
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      // Animate in with GSAP stagger
      gsap.fromTo(
        '#products-grid .product-card',
        { opacity: 0, y: 30, scale: 0.92 },
        { opacity: 1, y: 0, scale: 1, duration: 0.45, stagger: 0.065, ease: 'back.out(1.4)', clearProps: 'transform' }
      );

      // Attach buy button listeners
      grid.querySelectorAll('.btn-buy').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          openConfirmModal(btn.dataset.id, btn.dataset.tab);
        });
      });
    }

    // ══════════════════════════════════════════
    // TABS
    // ══════════════════════════════════════════
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.tab === currentTab) return;

        // Deactivate all
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.tab;

        // Animate out then in
        const grid = document.getElementById('products-grid');
        gsap.to(grid, {
          opacity: 0, y: -12, duration: 0.2, ease: 'power2.in',
          onComplete: () => {
            renderProducts(currentTab);
            gsap.fromTo(grid, { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.28, ease: 'power2.out' });
          }
        });
      });
    });

    // ══════════════════════════════════════════
    // CONFIRM MODAL
    // ══════════════════════════════════════════
    function openConfirmModal(id, tab) {
      const item = PRODUCTS[tab].find(p => p.id === id);
      if (!item) return;
      pendingProduct = { ...item, tab };

      document.getElementById('confirm-art').textContent = item.icon;
      document.getElementById('confirm-name').textContent = item.name;
      document.getElementById('confirm-desc').textContent = item.desc;
      document.getElementById('confirm-price').textContent = item.price.toLocaleString('ar-EG');

      document.getElementById('modal-confirm').classList.add('visible');
    }

    function closeConfirmModal() {
      document.getElementById('modal-confirm').classList.remove('visible');
      pendingProduct = null;
    }

    document.getElementById('confirm-close').addEventListener('click', closeConfirmModal);
    document.getElementById('confirm-cancel').addEventListener('click', closeConfirmModal);
    document.getElementById('modal-confirm').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeConfirmModal();
    });

    document.getElementById('confirm-buy').addEventListener('click', () => {
      if (!pendingProduct) return;

      if (gems < pendingProduct.price) {
        closeConfirmModal();
        openInsuffModal();
        return;
      }

      // Deduct gems
      gems -= pendingProduct.price;
      owned.push(pendingProduct.id);
      localStorage.setItem('maf_gems', gems.toString());
      localStorage.setItem('maf_owned', JSON.stringify(owned));

      closeConfirmModal();
      updateGemsDisplay(true);
      showPurchaseFlash(pendingProduct.name);

      // Re-render current tab to show owned state
      setTimeout(() => renderProducts(currentTab), 150);
    });

    // ══════════════════════════════════════════
    // INSUFFICIENT MODAL
    // ══════════════════════════════════════════
    function openInsuffModal() {
      document.getElementById('modal-insufficient').classList.add('visible');
    }
    function closeInsuffModal() {
      document.getElementById('modal-insufficient').classList.remove('visible');
    }
    document.getElementById('insuff-close').addEventListener('click', closeInsuffModal);
    document.getElementById('modal-insufficient').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeInsuffModal();
    });

    // ══════════════════════════════════════════
    // GEMS DISPLAY
    // ══════════════════════════════════════════
    function updateGemsDisplay(shake = false) {
      const el = document.getElementById('gems-count');
      el.textContent = gems.toLocaleString('ar-EG');

      if (shake) {
        const isLow = gems < 200;
        gsap.fromTo('#gems-count',
          { color: isLow ? '#ff0055' : '#ffde80', scale: 1.3 },
          { color: '#e5c05c', scale: 1, duration: 0.7, ease: 'elastic.out(1, 0.5)' }
        );

        if (isLow) {
          gsap.fromTo('#gems-display',
            { x: -6 },
            { x: 0, duration: 0.4, ease: 'elastic.out(2, 0.5)',
              keyframes: { x: [-6, 6, -4, 4, -2, 2, 0] } }
          );
        }
      }
    }

    // ══════════════════════════════════════════
    // PURCHASE FLASH
    // ══════════════════════════════════════════
    function showPurchaseFlash(name) {
      const el = document.getElementById('purchase-flash');
      el.textContent = `✓  تم شراء "${name}" بنجاح!`;
      gsap.fromTo(el,
        { opacity: 0, y: -20, scale: 0.85 },
        { opacity: 1, y: 0, scale: 1, duration: 0.35, ease: 'back.out(2)',
          onComplete: () => {
            gsap.to(el, { opacity: 0, y: -14, scale: 0.9, duration: 0.4, delay: 1.8, ease: 'power2.in' });
          }
        }
      );
    }

    // ══════════════════════════════════════════
    // HUD ENTRANCE
    // ══════════════════════════════════════════
    gsap.fromTo('#hud',
      { opacity: 0, y: -20 },
      { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }
    );
    gsap.fromTo('#tabs-bar .tab-btn',
      { opacity: 0, y: 16 },
      { opacity: 1, y: 0, duration: 0.4, stagger: 0.08, ease: 'back.out(1.5)', delay: 0.15 }
    );

    // ══════════════════════════════════════════
    // INITIAL RENDER
    // ══════════════════════════════════════════
    renderProducts(currentTab);
  </script>
</body>
</html>
